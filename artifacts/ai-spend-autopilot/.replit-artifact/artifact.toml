kind = "web"
previewPath = "/"
title = "AI Spend Autopilot"
version = "1.0.0"
id = "artifacts/ai-spend-autopilot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22561

[services.development]
run = "pnpm --filter @workspace/ai-spend-autopilot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-spend-autopilot", "run", "build" ]
publicDir = "artifacts/ai-spend-autopilot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22561"
BASE_PATH = "/"
