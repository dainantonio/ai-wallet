<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Wallet — Cost Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      color: #333;
    }

    .container {
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #2d3748;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 14px;
    }

    .section {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .section-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      color: #718096;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }

    .total-cost {
      font-size: 32px;
      font-weight: 700;
      color: #667eea;
      margin-bottom: 8px;
    }

    .total-label {
      font-size: 13px;
      color: #718096;
    }

    .breakdown {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .breakdown-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: #f7fafc;
      border-radius: 8px;
      border-left: 4px solid #667eea;
    }

    .breakdown-item.claude {
      border-left-color: #d4a574;
    }

    .breakdown-item.gemini {
      border-left-color: #4285f4;
    }

    .breakdown-item-name {
      font-size: 14px;
      font-weight: 500;
      color: #2d3748;
    }

    .breakdown-item-cost {
      font-size: 14px;
      font-weight: 600;
      color: #667eea;
    }

    .breakdown-item.claude .breakdown-item-cost {
      color: #d4a574;
    }

    .breakdown-item.gemini .breakdown-item-cost {
      color: #4285f4;
    }

    .session-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .session-cost {
      font-size: 16px;
      font-weight: 600;
      color: #2d3748;
    }

    .session-amount {
      font-size: 16px;
      font-weight: 700;
      color: #667eea;
    }

    .button-group {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    button {
      flex: 1;
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: #e2e8f0;
      color: #2d3748;
    }

    .btn-secondary:hover {
      background: #cbd5e0;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #718096;
      margin-top: 16px;
    }

    .footer a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    .loading {
      text-align: center;
      color: #718096;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>AI Wallet</h1>
      <div class="logo">💰</div>
    </div>

    <!-- Today's Total -->
    <div class="section">
      <div class="section-title">Today's Total</div>
      <div class="total-cost" id="total-cost">$0.0000</div>
      <div class="total-label">Across all AI tools</div>
    </div>

    <!-- Breakdown by Tool -->
    <div class="section">
      <div class="section-title">Breakdown by Tool</div>
      <div class="breakdown">
        <div class="breakdown-item">
          <div class="breakdown-item-name">ChatGPT</div>
          <div class="breakdown-item-cost" id="chatgpt-cost">$0.0000</div>
        </div>
        <div class="breakdown-item claude">
          <div class="breakdown-item-name">Claude</div>
          <div class="breakdown-item-cost" id="claude-cost">$0.0000</div>
        </div>
        <div class="breakdown-item gemini">
          <div class="breakdown-item-name">Gemini</div>
          <div class="breakdown-item-cost" id="gemini-cost">$0.0000</div>
        </div>
      </div>
    </div>

    <!-- Session Cost -->
    <div class="section">
      <div class="session-info">
        <div class="session-cost">Session Cost</div>
        <div class="session-amount" id="session-cost">$0.0000</div>
      </div>
      <div class="button-group">
        <button class="btn-secondary" id="reset-session">Reset Session</button>
      </div>
    </div>

    <!-- Dashboard Link -->
    <div class="section">
      <button class="btn-primary" id="view-dashboard">View Full Report</button>
    </div>

    <div class="footer">
      <p>Estimates based on token usage</p>
      <p><a href="https://ai-wallet--therussellfam20.replit.app" target="_blank">Visit Dashboard</a></p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
